<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Sistema</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Organize seus atendimentos com QRCode</h1>
  <p>Simples, rápido e gratuito.</p>

  <div id="botoesIniciais">
    <button id="btnEntrar">Entrar</button>
    <button id="btnCadastrar">Cadastre-se</button>
  </div>

  <!-- FORMULÁRIO DE CADASTRO -->
  <form id="cadastroForm" style="display:none;">
    <input type="text" id="nome" placeholder="Nome Completo" required>
    <input type="email" id="emailCadastro" placeholder="Email" required>
    <input type="password" id="senhaCadastro" placeholder="Senha" required>
    <input type="text" id="whatsapp" placeholder="WhatsApp" required>
    <input type="text" id="endereco" placeholder="Endereço Completo" required>
    <button type="submit">Criar Conta</button>
  </form>

  <!-- FORMULÁRIO DE LOGIN -->
  <form id="loginForm" style="display:none;">
    <input type="email" id="emailLogin" placeholder="Email" required>
    <input type="password" id="senhaLogin" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </form>

  <p id="mensagem"></p>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>

</body>
</html>
